<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>404 - 神经质领域 | 页面走失了</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 让疯狂感更“整体”，避免选中文字破坏视觉 */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
            overflow-x: hidden;
            position: relative;
            cursor: crosshair;
        }

        /* 神经质背景: 随机闪烁的噪点 + 干扰线层 */
        .glitch-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.35;
            background: repeating-linear-gradient(0deg, 
                rgba(0,255,65,0.08) 0px, 
                rgba(0,255,65,0.08) 2px,
                transparent 2px,
                transparent 8px),
                repeating-linear-gradient(90deg, 
                rgba(255,0,100,0.06) 0px, 
                rgba(255,0,100,0.06) 1px,
                transparent 1px,
                transparent 10px);
        }

        /* 动态“静电”层 */
        .static-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 30% 40%, rgba(255,0,200,0.03), rgba(0,255,255,0.03) 2px, transparent 3px, transparent 8px);
            pointer-events: none;
            z-index: 2;
            mix-blend-mode: overlay;
            animation: staticFlicker 0.08s infinite steps(2);
        }

        @keyframes staticFlicker {
            0% { opacity: 0.2; }
            100% { opacity: 0.55; }
        }

        /* 主容器 - 神经质核心 */
        .mad-container {
            position: relative;
            z-index: 20;
            max-width: 95vw;
            width: 860px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 2rem 2rem 3rem;
            border: 2px solid rgba(255, 20, 147, 0.7);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.3), 0 0 15px rgba(0, 255, 255, 0.5), inset 0 0 20px rgba(255,255,100,0.2);
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: borderPulse 0.3s infinite alternate ease-in-out;
        }

        @keyframes borderPulse {
            0% {
                border-color: rgba(255, 20, 147, 0.5);
                box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
            }
            100% {
                border-color: rgba(0, 255, 255, 0.9);
                box-shadow: 0 0 50px rgba(0, 255, 255, 0.6), 0 0 20px fuchsia;
            }
        }

        /* 主标题区域，故障艺术 */
        .error-glitch {
            text-align: center;
            font-size: 9rem;
            font-weight: 900;
            letter-spacing: -6px;
            position: relative;
            color: white;
            text-shadow: 5px 5px 0 #ff00cc, -3px -2px 0 #00ffff;
            margin-bottom: 1rem;
            animation: glitchSkew 0.2s infinite alternate;
            word-break: keep-all;
        }

        @keyframes glitchSkew {
            0% {
                transform: skew(0deg) translate(0px, 0px);
                text-shadow: 4px 4px 0 #ff00cc, -2px -2px 0 cyan;
            }
            100% {
                transform: skew(2deg) translate(2px, -1px);
                text-shadow: -3px 3px 0 lime, 4px -3px 0 magenta;
            }
        }

        .error-glitch span {
            display: inline-block;
            animation: charShake 0.09s infinite;
        }

        @keyframes charShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 1px); }
            75% { transform: translate(1px, -1px); }
            100% { transform: translate(0, 0); }
        }

        /* 标语 神经质短语 */
        .tagline {
            font-family: monospace;
            font-size: 1.4rem;
            text-align: center;
            color: #f0f;
            background: #000000aa;
            display: inline-block;
            width: auto;
            margin: 0 auto 1.5rem;
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            font-weight: bold;
            border-left: 3px solid cyan;
            border-right: 3px solid fuchsia;
            white-space: nowrap;
            overflow-x: auto;
            max-width: 90%;
            white-space: nowrap;
            text-overflow: clip;
        }

        /* EEEEE 疯狂区域 (原版精神加强版) */
        .crazy-eee {
            background: #00000099;
            padding: 1.8rem 1rem;
            border-radius: 36px;
            margin: 2rem 0 1.8rem;
            border: 1px dashed #ff44ee;
            box-shadow: inset 0 0 30px rgba(255,0,200,0.3), 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.05s linear;
            cursor: pointer;
        }

        .eee-matrix {
            font-family: monospace;
            font-size: 1rem;
            line-height: 1.3;
            color: #0f0;
            text-shadow: 0 0 5px #0f0, 0 0 1px #ff00c3;
            word-break: break-all;
            white-space: pre-wrap;
            font-weight: 500;
            max-height: 280px;
            overflow-y: auto;
            transition: all 0.04s linear;
            letter-spacing: 0px;
        }

        /* 自定义滚动条，更癫狂 */
        .eee-matrix::-webkit-scrollbar {
            width: 8px;
            height: 8px;
            background: #ff00aa33;
        }
        .eee-matrix::-webkit-scrollbar-thumb {
            background: #ff00dd;
            border-radius: 10px;
            box-shadow: inset 0 0 6px #fff;
        }

        /* 让 E 海洋更加动态随机 */
        .crazy-eee:hover .eee-matrix {
            animation: eRipple 0.08s infinite;
            color: #ff66ff;
            text-shadow: 0 0 2px cyan;
        }

        @keyframes eRipple {
            0% { letter-spacing: 0px; word-spacing: 0px; }
            100% { letter-spacing: 1.5px; word-spacing: -2px; }
        }

        /* 神经质按钮组 */
        .insane-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .insane-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff44ee;
            color: #ff44ee;
            padding: 0.8rem 1.8rem;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 0 5px magenta;
            letter-spacing: 1px;
        }

        .insane-btn:hover {
            transform: scale(1.05) rotate(1deg);
            background: magenta;
            color: black;
            border-color: cyan;
            box-shadow: 0 0 20px cyan;
            text-shadow: none;
        }

        .insane-btn:active {
            transform: scale(0.96) rotate(-2deg);
        }

        /* 随机乱码计数器 */
        .chaos-counter {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.9rem;
            font-family: monospace;
            color: #0fafaf;
            background: #00000066;
            width: fit-content;
            padding: 5px 20px;
            border-radius: 30px;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(5px);
        }

        /* 额外抖动效果 */
        .shake-once {
            animation: shakeCrazy 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shakeCrazy {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-4px, 2px) rotate(-1deg); }
            40% { transform: translate(4px, -2px) rotate(1deg); }
            60% { transform: translate(-2px, 1px) rotate(0.5deg); }
            80% { transform: translate(2px, -1px) rotate(-0.5deg); }
            100% { transform: translate(0, 0) rotate(0); }
        }

        /* 随机漂浮故障元素 */
        .floating-glitch {
            position: fixed;
            bottom: 10%;
            right: 3%;
            font-size: 2rem;
            opacity: 0.3;
            pointer-events: none;
            z-index: 12;
            font-family: monospace;
            animation: driftRotate 12s infinite alternate;
            filter: blur(1px);
        }

        @keyframes driftRotate {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.2; }
            100% { transform: translate(-50px, -40px) rotate(20deg); opacity: 0.7; }
        }

        /* 响应式，不要破坏EEE海洋 */
        @media (max-width: 700px) {
            .error-glitch { font-size: 4rem; letter-spacing: -2px; }
            .tagline { font-size: 0.9rem; white-space: normal; word-break: keep-all; }
            .insane-btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
            .eee-matrix { font-size: 0.7rem; }
        }

        /* 小故障层动画 */
        .glitch-text-move {
            animation: subtleGlitchMove 0.15s infinite alternate;
        }
        @keyframes subtleGlitchMove {
            from { transform: translateX(-1px); }
            to { transform: translateX(2px); }
        }
    </style>
</head>
<body>

<div class="glitch-bg"></div>
<div class="static-overlay"></div>
<div class="floating-glitch">⛧ EEE ⛧ 404 ⛧ ERR ⛧</div>

<div class="mad-container" id="madContainer">
    <div class="error-glitch">
        <span>4</span><span>0</span><span>4</span>
    </div>
    <div style="text-align: center;">
        <div class="tagline" id="dynamicTagline">
            ⚡ 神经链接已断裂 || 维度传送失败 ⚡
        </div>
    </div>

    <!-- 原版EEEEEE精神永存 但更神经质: 动态E洋流 + 随机字符渗入 -->
    <div class="crazy-eee" id="crazyEeeZone">
        <div class="eee-matrix" id="eeeMatrix">
            <!-- 用JS填充更疯狂的E矩阵，保留原始长文本风格并更加癫狂 -->
        </div>
    </div>

    <div class="insane-actions">
        <button class="insane-btn" id="refreshEbtn">🌀 更癫狂的 EEEEE 🌀</button>
        <button class="insane-btn" id="chaosModeBtn">💀 精神污染模式 💀</button>
        <button class="insane-btn" id="goBackBtn">↺ 强行逃离 ↺</button>
    </div>
    <div class="chaos-counter" id="chaosCounter">
        当前混乱指数: ▰▰▰▰▰▰▰▰▰▰ 100% 
    </div>
</div>

<script>
    (function() {
        // ---- 构建原版神经质EEEEEEEE 但更艺术, 保留超长长度甚至更长，动态随机插入怪异符号 保持E的主体但扭曲
        const BASE_EEE_COUNT = 800;   // 每个段落块大约这么多E，但会生成随机行数，总字符数远超原始 (原版有超多E)
        // 为了模拟原版但更疯狂的视觉效果: 生成超长串 E 但混入随机乱码、闪烁的变异字符，同时保留主要的EEEE风格。
        
        let currentChaosLevel = 70;   // 0-100 混乱等级
        let chaosInterval = null;
        let isChaosActive = false;
        let eeeContainer = document.getElementById('eeeMatrix');
        let chaosCounterSpan = document.getElementById('chaosCounter');
        let taglineElem = document.getElementById('dynamicTagline');
        const madContainer = document.getElementById('madContainer');

        // 生成神经质EEEE字符串 核心函数 (保留大量E但增加神经波动)
        function generateCrazyEEE(chaos = currentChaosLevel) {
            // 原始精神: 全是EEEEEEE, 但为了更好更疯，生成块状文本，类似原版一整屏E，但加入故障毛刺
            let result = '';
            // 构建大约 80~150 行，每行长度约 80~300 个字符不等，使其更密集乱
            const linesCount = Math.floor(70 + (chaos / 100) * 90);  // 70~160行
            for (let i = 0; i < linesCount; i++) {
                let lineLength = Math.floor(70 + Math.random() * 200);  // 70~270长度
                let line = '';
                // 混乱因子: 根据chaos决定变异E的概率和额外符号
                for (let j = 0; j < lineLength; j++) {
                    let rand = Math.random() * 100;
                    // 基础 85%以上为 E 或者 e (大小写变异, 更癫狂)
                    if (rand < (85 + chaos * 0.12)) {  // chaos越高 越容易出变异符号 但主E依然占比很高
                        // 决定是E, e, 还是带重音字母或乱码风格
                        let variant = Math.random();
                        if (variant < 0.7) line += 'E';
                        else if (variant < 0.85) line += 'e';
                        else if (variant < 0.94) line += 'Ę';
                        else line += '€';
                    } else {
                        // 其他疯狂字符: 数字、乱码、特殊符号增加神经质
                        const glitchChars = ['#', '%', '&', '*', '!', '?', '@', '$', '∞', 'ψ', '⛧', '⨀', '⨂', '∅', '⁉', '‽', '〄', '⚡', '🌀'];
                        line += glitchChars[Math.floor(Math.random() * glitchChars.length)];
                    }
                }
                // 附加随机的尾缀故障效果
                if (Math.random() < 0.2) {
                    line += '   <span style="color:magenta">⛧ERR⛧</span>';
                } else if (Math.random() < 0.1) {
                    line += '   💀💀';
                }
                result += line + '\n';
            }
            // 额外附加超长爆炸行: 致敬原版但更加有病
            for (let mega = 0; mega < 3; mega++) {
                let megaLine = '';
                let megaLen = 400 + Math.floor(Math.random() * 300);
                for (let k = 0; k < megaLen; k++) {
                    megaLine += (Math.random() < 0.92) ? 'E' : (Math.random() < 0.5 ? 'Ɛ' : '∃');
                }
                result += megaLine + '   ⚡⚡ 超载E ⚡⚡\n';
            }
            return result;
        }

        // 渲染EEE矩阵，并且保留HTML结构，但内部会包含少量span (不影响布局)
        function renderEEE() {
            if (!eeeContainer) return;
            let rawText = generateCrazyEEE(currentChaosLevel);
            // 为了防止XSS但我们需要展示有趣的HTML标记: 因为generateCrazyEEE已经包含了可能的span，但其他部分需要转义，但是为了神经质风格保留少量样式标签，所以我们手动替换换行以及转义危险字符但允许span。
            // 安全起见: 将文本中的< > 除了我们添加的span之外进行转义，因为glitchChars不会包含尖括号。但是为了稳健处理，先将整个字符串做基础转义，然后再将特定标记还原为HTML。
            let escaped = rawText.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
            // 还原我们期望的彩色样式标记: 将 &lt;span 还原 成 <span , 类似处理
            escaped = escaped.replace(/&lt;span style="color:magenta"&gt;⛧ERR⛧&lt;\/span&gt;/g, '<span style="color:magenta; text-shadow:0 0 3px white;">⛧ERR⛧</span>');
            escaped = escaped.replace(/💀💀/g, '<span style="color:cyan; font-weight:bold;">💀💀</span>');
            escaped = escaped.replace(/⚡⚡ 超载E ⚡⚡/g, '<span style="color:yellow; background:black; padding:0 4px; border-radius:8px;">⚡⚡ 超载E ⚡⚡</span>');
            // 同时处理换行变成 <br>
            let htmlLines = escaped.split('\n').map(line => line || '&nbsp;').join('<br>');
            eeeContainer.innerHTML = htmlLines;
            // 自动滚动到底部/顶部制造随机感，神经质体验，每次重新渲染滚动到一个随机位置
            if (eeeContainer && Math.random() > 0.5) {
                eeeContainer.scrollTop = Math.random() * (eeeContainer.scrollHeight - eeeContainer.clientHeight);
            } else {
                eeeContainer.scrollTop = 0;
            }
        }

        // 更新混乱指数UI
        function updateChaosUI() {
            let level = Math.min(100, Math.max(0, currentChaosLevel));
            let barLength = Math.floor(level / 10);
            let filled = '▰'.repeat(barLength);
            let empty = '▱'.repeat(10 - barLength);
            chaosCounterSpan.innerHTML = `⚡ 混乱指数: ${filled}${empty} ${level}% ⚡`;
            // 根据混乱等级改变容器边框光效频率
            if (level > 70) {
                madContainer.style.animation = 'borderPulse 0.12s infinite alternate';
            } else if (level > 30) {
                madContainer.style.animation = 'borderPulse 0.25s infinite alternate';
            } else {
                madContainer.style.animation = 'borderPulse 0.5s infinite alternate';
            }
            // 调整tagline随机闪烁
            const taglines = [
                "⚡ 神经链接已断裂 || 维度传送失败 ⚡",
                "💢 EEEEEEEEE 异常爆发 💢",
                "🌀 404 错误: 现实解析错误 🌀",
                "🤪 超载E宇宙 | 熵增崩溃 🤪",
                "⚡ 此页面已变成E的汪洋 ⚡",
                "💀 大脑过载 | 神经质404 💀",
                "🔁 EEEEEEEEEEEEEEE 永不停歇 🔁"
            ];
            if (Math.random() < 0.3) {
                let newTag = taglines[Math.floor(Math.random() * taglines.length)];
                taglineElem.style.transform = 'scale(1.02)';
                taglineElem.innerText = newTag;
                setTimeout(() => { taglineElem.style.transform = ''; }, 200);
            }
        }

        // 增加混乱程度
        function increaseChaos(amount = 5) {
            currentChaosLevel = Math.min(100, currentChaosLevel + amount);
            updateChaosUI();
            renderEEE();  // 重新生成更疯魔的E海洋
            // 抖动一下容器
            madContainer.classList.add('shake-once');
            setTimeout(() => madContainer.classList.remove('shake-once'), 300);
        }

        function setChaos(level) {
            currentChaosLevel = Math.min(100, Math.max(0, level));
            updateChaosUI();
            renderEEE();
        }

        // 精神污染模式 —— 自动不断增长混乱 + 快速刷新EEE + 视觉闪烁
        function toggleChaosMode() {
            if (isChaosActive) {
                if (chaosInterval) clearInterval(chaosInterval);
                isChaosActive = false;
                document.getElementById('chaosModeBtn').innerHTML = '💀 精神污染模式 💀';
                document.getElementById('chaosModeBtn').style.borderColor = '#ff44ee';
                // 停止时稍微降低混乱
                setChaos(Math.max(40, currentChaosLevel - 10));
            } else {
                isChaosActive = true;
                document.getElementById('chaosModeBtn').innerHTML = '🛑 停止污染！ 🛑';
                document.getElementById('chaosModeBtn').style.borderColor = 'lime';
                chaosInterval = setInterval(() => {
                    // 每秒混乱增长，但不超过100
                    if (currentChaosLevel < 100) {
                        currentChaosLevel = Math.min(100, currentChaosLevel + 3);
                        updateChaosUI();
                        renderEEE();
                    } else {
                        // 爆满后随机乱闪提示
                        eeeContainer.style.animation = 'eRipple 0.05s infinite';
                        setTimeout(() => { if(eeeContainer) eeeContainer.style.animation = ''; }, 300);
                    }
                    // 额外每0.5秒刷新一次eee内容, 更疯狂
                    if (Math.random() < 0.6) renderEEE();
                    // 随机抖动页面元素
                    let randDeg = (Math.random() - 0.5) * 2;
                    madContainer.style.transform = `rotate(${randDeg}deg) scale(1.01)`;
                    setTimeout(() => { if(madContainer) madContainer.style.transform = ''; }, 100);
                }, 700);
            }
        }

        // 刷新EEE (手动癫狂)
        function refreshEEE() {
            increaseChaos(2);  // 增加混乱并刷新
            // 附加特效: 滚动条疯狂滚动
            if (eeeContainer) {
                for(let i=0;i<3;i++) {
                    setTimeout(() => {
                        eeeContainer.scrollTop = Math.random() * (eeeContainer.scrollHeight);
                    }, i*50);
                }
            }
            // 更改临时标签
            taglineElem.innerText = '🌀 EEE 洪流 再临! 你被E包围了 🌀';
            setTimeout(() => {
                if (taglineElem) taglineElem.innerText = '⚡ 神经链接已断裂 || 维度传送失败 ⚡';
            }, 1500);
        }

        // 逃离按钮: 模拟返回上一页或者刷新首页，同时也展示滑稽提示
        function escapeAttempt() {
            // 神经质反馈
            const messages = [
                '⛔ 你以为逃得掉？ EEEEE会跟随你！ ⛔', 
                '🚀 正在跳转现实扭曲点... 🚀', 
                '💢 404 虚空拒绝你离开 💢', 
                '😈 逃？ 不如享受E的海洋 😈'
            ];
            let msg = messages[Math.floor(Math.random() * messages.length)];
            taglineElem.innerText = msg;
            madContainer.classList.add('shake-once');
            setTimeout(() => {
                // 最终仍然尝试后退或跳转主页 (优雅地)
                if (document.referrer && document.referrer !== "") {
                    window.history.back();
                } else {
                    window.location.href = "/";
                }
                // 但如果上面失败，至少给用户一个惊喜
                setTimeout(() => {
                    if(window.location.pathname !== '/') window.location.href = '/';
                }, 300);
            }, 800);
        }

        // 初始化E的规模巨量
        function init() {
            currentChaosLevel = 78;   // 初始高混乱度 致敬神经质
            updateChaosUI();
            renderEEE();
            // 给区域增加随机飘忽不定鼠标事件
            const crazyZone = document.getElementById('crazyEeeZone');
            crazyZone.addEventListener('mousemove', (e) => {
                if (Math.random() < 0.2) {
                    eeeContainer.style.transform = `translate(${(e.clientX % 10) - 5}px, ${(e.clientY % 10) - 5}px)`;
                    setTimeout(() => { if(eeeContainer) eeeContainer.style.transform = ''; }, 80);
                }
            });
            // 随机每隔几秒自动轻微增加混乱 让页面一直有生命感
            setInterval(() => {
                if (!isChaosActive && Math.random() < 0.35) {
                    currentChaosLevel = Math.min(100, currentChaosLevel + 1);
                    updateChaosUI();
                    if (Math.random() < 0.3) renderEEE();
                }
            }, 4000);
        }

        document.getElementById('refreshEbtn').addEventListener('click', refreshEEE);
        document.getElementById('chaosModeBtn').addEventListener('click', toggleChaosMode);
        document.getElementById('goBackBtn').addEventListener('click', escapeAttempt);

        init();
    })();
</script>
</body>
</html>
