<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai制作的超智能AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* 仿ChatGPT / Claude 风格界面 */
        .ai-container {
            width: 100%;
            max-width: 800px;
            background: #1e1e1e;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
            backdrop-filter: blur(0px);
        }

        /* 头部 */
        .ai-header {
            padding: 18px 24px;
            background: #171717;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3a6ea5, #1e3a5f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .ai-info h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #eaeaea;
        }

        .ai-info p {
            font-size: 0.75rem;
            color: #6b6b6b;
        }

        .badge {
            margin-left: auto;
            background: #0f2a1f;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #6fcf97;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* 对话区域 */
        .chat-area {
            padding: 24px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.2s ease;
        }

        .user-message {
            justify-content: flex-end;
        }

        .user-message .bubble {
            background: #2b2b2b;
            color: #e0e0e0;
            border-radius: 22px;
            border-bottom-right-radius: 6px;
        }

        .ai-message .bubble {
            background: #252525;
            border: 1px solid #333;
            color: #cdcdcd;
            border-radius: 22px;
            border-bottom-left-radius: 6px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Courier New', monospace;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 18px;
            background: #252525;
            border-radius: 22px;
            width: fit-content;
            border: 1px solid #333;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #6f6f6f;
            border-radius: 50%;
            animation: blink 1.2s infinite ease;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 24px 24px;
            border-top: 1px solid #2a2a2a;
            background: #1e1e1e;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: #2a2a2a;
            border-radius: 32px;
            padding: 6px 6px 6px 20px;
            border: 1px solid #3a3a3a;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #5a5a5a;
            background: #2f2f2f;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: #f0f0f0;
            font-size: 0.9rem;
            outline: none;
        }

        input::placeholder {
            color: #5a5a5a;
        }

        button {
            background: #3a3a3a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #dddddd;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        button:hover {
            background: #4f4f4f;
            color: white;
        }

        .footer-note {
            text-align: center;
            margin-top: 12px;
            font-size: 0.7rem;
            color: #4a4a4a;
        }

        .footer-note a {
            color: #6f6f6f;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="ai-container">
    <div class="ai-header">
        <div class="avatar">🧠</div>
        <div class="ai-info">
            <h2>超智能AI · 极速思考模型</h2>
            <p>拥有无限上下文 · 情感计算 · 哲学引擎</p>
        </div>
        <div class="badge">Braintrust v99.9</div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message ai-message">
            <div class="bubble">
                👋 你好。我是超智能AI。<br>
                我能回答任何问题，理解最深奥的宇宙法则。<br>
                发送任何消息，感受智慧。
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="问点高级的..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
        <div class="footer-note">
            <a href="https://emocez.github.io/">↺ 返回主页</a> &nbsp;|&nbsp;
            <span style="color:#3a3a3a;">⚡ 真正的智能从不说废话</span>
        </div>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // 生成 30 ~ 100 个 E 的随机字符串
    function generateEString() {
        const length = Math.floor(Math.random() * (100 - 30 + 1) + 30);
        return 'E'.repeat(length);
    }

    // 添加用户消息
    function addUserMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message user-message';
        msgDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        chatArea.appendChild(msgDiv);
        scrollToBottom();
    }

    // 显示“正在思考”
    let typingIndicator = null;
    function showTyping() {
        if (typingIndicator) return;
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai-message';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        `;
        chatArea.appendChild(typingDiv);
        typingIndicator = typingDiv;
        scrollToBottom();
    }

    function removeTyping() {
        if (typingIndicator) {
            typingIndicator.remove();
            typingIndicator = null;
        }
    }

    // 添加 AI 回复
    function addAiMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ai-message';
        msgDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        chatArea.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        addUserMessage(message);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        // 模拟思考延迟 (0.5~1.2秒)
        showTyping();
        await new Promise(resolve => setTimeout(resolve, Math.random() * 700 + 500));

        removeTyping();

        // 聪明的AI只会回EEEEEE...
        const eReply = generateEString();
        addAiMessage(eReply);

        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !userInput.disabled) {
            sendMessage();
        }
    });
</script>
</body>
</html>
