<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEEEE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #e6e6e8;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            color: #1c1c1e;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        .greeting {
            font-size: 1.1rem;
            color: #8e8e93;
            margin-bottom: 32px;
            border-left: 3px solid #007aff;
            padding-left: 14px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 48px;
        }
        .btn {
            display: block;
            background: #f9f9fb;
            border: 1px solid #e9e9ef;
            border-radius: 20px;
            padding: 16px 20px;
            text-decoration: none;
            color: #1c1c1e;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: #ffffff;
            border-color: #007aff;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0,122,255,0.08);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn span {
            font-weight: 600;
            color: #007aff;
            margin-right: 8px;
        }
        footer {
            border-top: 1px solid #efeff4;
            padding-top: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: #8e8e93;
        }
        .note {
            background: #f2f2f5;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .note:hover {
            background: #e5e5ea;
            transform: translateY(-1px);
        }
        .note a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>EEEEE</h1>
        <div class="greeting">你好！我是 EMOCEZ！</div>

        <div class="links">
            <a href="https://emocez.github.io/testgame" class="btn" target="_blank" rel="noopener noreferrer">
                <span>🎮</span> 点击此处打开 testgame
            </a>
            <a href="https://emocez.github.io/2007" class="btn" target="_blank" rel="noopener noreferrer">
                <span>📼</span> 点击此处打开 2007
            </a>
            <a href="https://emocez.github.io/youarefreeking" class="btn" target="_blank" rel="noopener noreferrer">
                <span>🌀</span> 点击此处打开 º＊√`·↓}＊→ⁿ＃
            </a>
        </div>

        <footer>
            <div class="note">
                <a href="https://emocez.github.io/superbox/" target="_blank" rel="noopener noreferrer">
                    💡 因为我不太会 html，所以这个网页是 ai 整的
                </a>
            </div>
        </footer>
    </div>
</body>
</html>
